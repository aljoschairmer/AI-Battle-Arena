# Production-style topology: Redis backbone with the Engine and Brain split into
# separate, independently-scalable processes. The Engine never blocks on the
# Brain — they only talk over Redis pub/sub + KV.
#
#   cp .env.example .env   # then set ARENA_API_KEY and OPENROUTER_API_KEY
#   docker compose up --build
#
# Run a pure deterministic bot (no LLM cost): leave OPENROUTER_API_KEY empty and
# `docker compose up redis engine`.
#
# Live data view: `docker compose up redis-dashboard` serves Redis Commander
# on http://localhost:5540 — pre-connected to the bus. The key tree shows the
# KV mirror (bot0:arena:kv:* — current directive/policy/insights, ~300s TTL).
# For the live pub/sub bus traffic use the CLI instead:
#   docker compose exec redis redis-cli psubscribe '*'
# NOTE: only meaningful with BUS=redis (this topology). A BUS=memory process
# keeps everything in-process and Redis stays empty.

services:
  redis:
    image: redis:7-alpine
    container_name: redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Web dashboard for the Redis bus: Redis Commander on host port 5540.
  # Why not RedisInsight? Its official Docker image segfaults in a restart
  # loop on ARM64 hosts (open upstream bugs redis/RedisInsight#4657 and
  # #4019, exit 139) — Redis Commander ships true multi-arch images
  # (amd64/arm64/armv7) and needs no init sidecar: REDIS_HOSTS pre-connects
  # the bus at boot, so the page lands directly on the live database.
  redis-dashboard:
    image: ghcr.io/joeferner/redis-commander:latest
    container_name: redis-dashboard
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      # Redis Commander listens on 8081 inside the container; the host port
      # stays 5540 so bookmarks/README/tunnel semantics don't change.
      - "5540:8081"
    environment:
      # label:host:port — shows up as "battle-arena-bus" in the UI, already
      # connected. No setup dialog, no REST registration needed.
      REDIS_HOSTS: battle-arena-bus:redis:6379
    # Marks the container healthy only once the HTTP server actually accepts
    # connections — the Cloudflare tunnel gates on this, so cloudflared never
    # dials a not-yet-listening container ("connect: connection refused" in
    # the tunnel logs). It's a Node app, so probe with node itself.
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "require('http').get('http://127.0.0.1:8081/',
          r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error',
          () => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # Public URL for the dashboard via a Cloudflare QUICK tunnel (no account,
  # no config): prints a random https://<something>.trycloudflare.com URL in
  # its logs on boot — `docker compose logs redis-dashboard-tunnel | grep
  # trycloudflare`. SECURITY: the URL is unauthenticated and Redis Commander
  # can WRITE to the bus Redis — share it only while you need it and stop the
  # service afterwards (`docker compose stop redis-dashboard-tunnel`). The URL
  # changes on every restart; that's inherent to quick tunnels.
  redis-dashboard-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: redis-dashboard-tunnel
    restart: unless-stopped
    # service_healthy (not service_started): cloudflared must not come up
    # before RedisInsight listens on 5540, or every proxied request fails with
    # "connect: connection refused" until the dashboard finishes booting.
    depends_on:
      redis-dashboard:
        condition: service_healthy
    # http2 = edge connection over TCP:7844 instead of QUIC (UDP:7844) —
    # survives UDP-blocking firewalls. Note: a bare `tunnel run` needs a NAMED
    # tunnel (Cloudflare account + token); this stays a token-less quick
    # tunnel. For a named tunnel with a stable domain, set TUNNEL_TOKEN in
    # .env and swap the command for:
    #   ["tunnel", "--no-autoupdate", "run", "--protocol", "http2", "--token", "${TUNNEL_TOKEN}"]
    command: ["tunnel", "--no-autoupdate", "--protocol", "http2", "--url", "http://redis-dashboard:8081"]

  # One-shot root helper for the bind mounts: Docker auto-creates missing
  # bind-mount source dirs (./logs/brain didn't exist — logs/ is gitignored)
  # as ROOT, but the app containers run as the unprivileged `node` user
  # (uid 1000), which then fails every write with "EACCES: permission
  # denied, open 'logs/brain/scout.json.tmp'". This pre-creates the host
  # dirs and hands them to uid 1000 before anything that writes starts.
  volume-init:
    image: busybox:stable
    container_name: volume-init
    user: "0:0"
    restart: "no"
    volumes:
      - ./logs:/fix/logs
      - ./data/knowledge:/fix/data/knowledge
    command:
      - sh
      - -c
      - mkdir -p /fix/logs/brain /fix/logs/outcomes && chown -R 1000:1000 /fix/logs /fix/data/knowledge

  # Passive opponent scout: watches the PUBLIC spectator WebSocket (no API
  # key, no account, no LLM cost) and learns every arena bot's playstyle —
  # draft tendencies, win rates, aggression, preferred range, mine habits —
  # from rounds we never played in. Profiles land in scout.json inside the
  # bind-mounted logs/brain/, where the fighting fleet's Brain picks them up
  # for its Loadout/Strategist prompts. Runs fine 24/7 with the fleet down.
  scout:
    build: .
    container_name: scout
    restart: unless-stopped
    depends_on:
      volume-init:
        condition: service_completed_successfully
    environment:
      ROLE: scout
      ARENA_WS_URL: ${ARENA_WS_URL:-wss://arena.angel-serv.com/ws/bot}
      ARENA_WS_ORIGIN: ${ARENA_WS_ORIGIN:-https://arena.angel-serv.com}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      HTTP_PROXY: ${HTTP_PROXY:-}
      NO_PROXY: ${NO_PROXY:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    volumes:
      # Shared with host-run fleets AND the knowledge dump — the whole point
      # is that the scout's learning outlives its container.
      - ./logs/brain:/app/logs/brain
      # The shutdown knowledge dump writes here; without the mount it targets
      # the container FS ("EACCES: permission denied, mkdir
      # 'data/knowledge/brain'") and would be lost with the container anyway.
      - ./data/knowledge:/app/data/knowledge

  engine:
    build: .
    container_name: engine
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      volume-init:
        condition: service_completed_successfully
    # Shared with the brain container: memory-bot*.json (fleet-wide weapon
    # evidence — BrainMemoryStore) and the unbounded outcomes.jsonl (the
    # all-time weapon-evidence backstop, draftEvidence.ts). Without this
    # mount each container reads/writes its own empty ./logs/*, so the
    # deterministic fallback draft's evidence check ran against nothing in
    # a split deployment even though it works in single-process ROLE=all.
    volumes:
      - ./logs/brain:/app/logs/brain
      - ./logs/outcomes:/app/logs/outcomes
    environment:
      ROLE: engine
      BUS: redis
      REDIS_URL: redis://redis:6379
      ARENA_API_KEY: ${ARENA_API_KEY}
      # Comma-separated keys to run several bots in parallel from one engine
      # process (each gets its own identity + brain + bus scope).
      ARENA_API_KEYS: ${ARENA_API_KEYS:-}
      ARENA_HTTP_BASE: ${ARENA_HTTP_BASE:-https://arena.angel-serv.com}
      ARENA_WS_URL: ${ARENA_WS_URL:-wss://arena.angel-serv.com/ws/bot}
      ARENA_WS_ORIGIN: ${ARENA_WS_ORIGIN:-https://arena.angel-serv.com}
      BOT_NAME: ${BOT_NAME:-NeuralReaper}
      BOT_COLOR: ${BOT_COLOR:-00d4ff}
      # Per-bot overrides for multi-key runs (comma-separated, aligned with
      # ARENA_API_KEYS; empty slots keep the derived default).
      BOT_NAMES: ${BOT_NAMES:-}
      BOT_COLORS: ${BOT_COLORS:-}
      # Bot-to-bot coalition (needs 2+ keys in ARENA_API_KEYS to matter).
      BOT_COOP: ${BOT_COOP:-false}
      # Behind a corporate proxy (e.g. Zscaler)? Set these in .env so the engine
      # can route/tunnel WebSockets and bypass SSL inspection for the arena host.
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      HTTP_PROXY: ${HTTP_PROXY:-}
      NO_PROXY: ${NO_PROXY:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}

  brain:
    build: .
    container_name: brain
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      volume-init:
        condition: service_completed_successfully
    # See the engine service's identical mount for why: this is where
    # memory-bot*.json actually gets written (BrainMemoryStore lives in the
    # orchestrator), and outcomes.jsonl is the all-time evidence backstop.
    volumes:
      - ./logs/brain:/app/logs/brain
      - ./logs/outcomes:/app/logs/outcomes
    environment:
      ROLE: brain
      BUS: redis
      REDIS_URL: redis://redis:6379
      # Must match the engine's list so each brain uses the same per-bot bus scope.
      ARENA_API_KEYS: ${ARENA_API_KEYS:-}
      ARENA_HTTP_BASE: ${ARENA_HTTP_BASE:-https://arena.angel-serv.com}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL_STRATEGIST: ${OPENROUTER_MODEL_STRATEGIST:-anthropic/claude-sonnet-4.6}
      OPENROUTER_MODEL_LOADOUT: ${OPENROUTER_MODEL_LOADOUT:-anthropic/claude-sonnet-4.6}
      OPENROUTER_MODEL_TACTICIAN: ${OPENROUTER_MODEL_TACTICIAN:-anthropic/claude-haiku-4.5}
      OPENROUTER_MODEL_COORDINATOR: ${OPENROUTER_MODEL_COORDINATOR:-anthropic/claude-sonnet-4.6}
      TACTICIAN_INTERVAL_MS: ${TACTICIAN_INTERVAL_MS:-2500}
      LLM_TIMEOUT_MS: ${LLM_TIMEOUT_MS:-8000}
      # Bot-to-bot coalition — must match the engine's setting so the squad-wide
      # Coordinator agent starts (needs BOT_COOP=true, an LLM key, and 2+ bots).
      BOT_COOP: ${BOT_COOP:-false}
      COOP_COORDINATOR_INTERVAL_MS: ${COOP_COORDINATOR_INTERVAL_MS:-3000}
      # Route REST + OpenRouter calls through the corporate proxy if present.
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      HTTP_PROXY: ${HTTP_PROXY:-}
      NO_PROXY: ${NO_PROXY:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
