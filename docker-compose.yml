# Production-style topology: Redis backbone with the Engine and Brain split into
# separate, independently-scalable processes. The Engine never blocks on the
# Brain — they only talk over Redis pub/sub + KV.
#
#   cp .env.example .env   # then set ARENA_API_KEY and OPENROUTER_API_KEY
#   docker compose up --build
#
# Run a pure deterministic bot (no LLM cost): leave OPENROUTER_API_KEY empty and
# `docker compose up redis engine`.
#
# Live data view: `docker compose up redis-dashboard` serves RedisInsight on
# http://localhost:5540 — pre-connected to the bus. The Browser tab shows the
# KV mirror (bot0:arena:kv:* — current directive/policy/insights, ~300s TTL);
# the Pub/Sub tool with pattern `*` streams the live bus traffic (snapshots,
# directives, loadout plans, coop reports) as it flows Engine <-> Brain.
# NOTE: only meaningful with BUS=redis (this topology). A BUS=memory process
# keeps everything in-process and Redis stays empty.

services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Web dashboard for the Redis bus: RedisInsight (official GUI) on port 5540.
  # Ships pre-connected to the `redis` service via the RI_REDIS_* variables,
  # so opening the page lands directly on the live database — no setup dialog.
  redis-dashboard:
    image: redis/redisinsight:latest
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "5540:5540"
    environment:
      RI_REDIS_HOST: redis
      RI_REDIS_PORT: "6379"
      RI_REDIS_ALIAS: battle-arena-bus
    volumes:
      # Persists the UI's own settings/history across container restarts.
      - redisinsight-data:/data

  engine:
    build: .
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      ROLE: engine
      BUS: redis
      REDIS_URL: redis://redis:6379
      ARENA_API_KEY: ${ARENA_API_KEY}
      # Comma-separated keys to run several bots in parallel from one engine
      # process (each gets its own identity + brain + bus scope).
      ARENA_API_KEYS: ${ARENA_API_KEYS:-}
      ARENA_HTTP_BASE: ${ARENA_HTTP_BASE:-https://arena.angel-serv.com}
      ARENA_WS_URL: ${ARENA_WS_URL:-wss://arena.angel-serv.com/ws/bot}
      ARENA_WS_ORIGIN: ${ARENA_WS_ORIGIN:-https://arena.angel-serv.com}
      BOT_NAME: ${BOT_NAME:-NeuralReaper}
      BOT_COLOR: ${BOT_COLOR:-00d4ff}
      # Per-bot overrides for multi-key runs (comma-separated, aligned with
      # ARENA_API_KEYS; empty slots keep the derived default).
      BOT_NAMES: ${BOT_NAMES:-}
      BOT_COLORS: ${BOT_COLORS:-}
      # Bot-to-bot coalition (needs 2+ keys in ARENA_API_KEYS to matter).
      BOT_COOP: ${BOT_COOP:-false}
      # Behind a corporate proxy (e.g. Zscaler)? Set these in .env so the engine
      # can route/tunnel WebSockets and bypass SSL inspection for the arena host.
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      HTTP_PROXY: ${HTTP_PROXY:-}
      NO_PROXY: ${NO_PROXY:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}

  brain:
    build: .
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      ROLE: brain
      BUS: redis
      REDIS_URL: redis://redis:6379
      # Must match the engine's list so each brain uses the same per-bot bus scope.
      ARENA_API_KEYS: ${ARENA_API_KEYS:-}
      ARENA_HTTP_BASE: ${ARENA_HTTP_BASE:-https://arena.angel-serv.com}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL_STRATEGIST: ${OPENROUTER_MODEL_STRATEGIST:-anthropic/claude-sonnet-4.6}
      OPENROUTER_MODEL_LOADOUT: ${OPENROUTER_MODEL_LOADOUT:-anthropic/claude-sonnet-4.6}
      OPENROUTER_MODEL_TACTICIAN: ${OPENROUTER_MODEL_TACTICIAN:-anthropic/claude-haiku-4.5}
      OPENROUTER_MODEL_COORDINATOR: ${OPENROUTER_MODEL_COORDINATOR:-anthropic/claude-sonnet-4.6}
      TACTICIAN_INTERVAL_MS: ${TACTICIAN_INTERVAL_MS:-2500}
      LLM_TIMEOUT_MS: ${LLM_TIMEOUT_MS:-8000}
      # Bot-to-bot coalition — must match the engine's setting so the squad-wide
      # Coordinator agent starts (needs BOT_COOP=true, an LLM key, and 2+ bots).
      BOT_COOP: ${BOT_COOP:-false}
      COOP_COORDINATOR_INTERVAL_MS: ${COOP_COORDINATOR_INTERVAL_MS:-3000}
      # Route REST + OpenRouter calls through the corporate proxy if present.
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      HTTP_PROXY: ${HTTP_PROXY:-}
      NO_PROXY: ${NO_PROXY:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}

volumes:
  redisinsight-data:
